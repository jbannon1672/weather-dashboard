<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Brigantine Weather & Tides</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; background:#101820; color:white; font-family:Arial,sans-serif; }
    .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; padding:22px; }
    .card { background:#1f2d3a; border-radius:18px; padding:22px; box-shadow:0 4px 16px #0006; }
    .wide { grid-column:span 1; }
    .full { grid-column:span 3; }
    h1,h2 { margin:0 0 12px; }
    .clock { font-size:96px; font-weight:bold; }
    .big { font-size:52px; font-weight:bold; }
    .text { font-size:24px; line-height:1.45; }
    .small { font-size:20px; line-height:1.45; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <h1>Sea Isle City</h1>
      <div id="clock" class="clock">--:--</div>
      <div id="date" class="text"></div>
    </div>

    <div class="card">
      <h2>Current Weather</h2>
      <div id="weather" class="text">Loading...</div>
    </div>

    <div class="card">
      <h2>Sun / Wind</h2>
      <div id="wind" class="text">Loading...</div>
    </div>

    <div class="card">
      <h2>5-Day Forecast</h2>
      <div id="forecast" class="small">Loading...</div>
    </div>

    <div class="card">
      <h2>Next Tides</h2>
      <div id="tides" class="small">Loading...</div>
    </div>

    <div class="card full">
      <h2>NOAA Station: Townsend Inlet, NJ</h2>
      <div class="small">Weather and tides update automatically over Wi-Fi.</div>
    </div>
  </div>

<script>
const LAT = 39.153;
const LON = -74.692;
const STATION = "8535375";

function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
  document.getElementById("date").textContent =
    now.toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"});
}
setInterval(updateClock, 1000);
updateClock();

function dir(deg) {
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round(deg / 45) % 8];
}

async function loadWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/New_York`;
  const r = await fetch(url);
  const d = await r.json();

document.getElementById("weather").innerHTML =
  `<div class="big">${Math.round(d.current.temperature_2m)}°F</div>` +
  `Humidity: ${d.current.relative_humidity_2m}%<br>` +
  `Today's High: ${Math.round(d.daily.temperature_2m_max[0])}°<br>` +
  `Today's Low: ${Math.round(d.daily.temperature_2m_min[0])}°`;

  document.getElementById("wind").innerHTML =
    `Wind: ${Math.round(d.current.wind_speed_10m)} mph ${dir(d.current.wind_direction_10m)}<br>` +
    `Sunrise: ${new Date(d.daily.sunrise[0]).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"})}<br>` +
    `Sunset: ${new Date(d.daily.sunset[0]).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"})}`;

  let out = "";
  for (let i = 0; i < 5; i++) {
    const day = new Date(d.daily.time[i]).toLocaleDateString([], {weekday:"short"});
    out += `${day}: ${Math.round(d.daily.temperature_2m_max[i])}° / ${Math.round(d.daily.temperature_2m_min[i])}° — Rain ${d.daily.precipitation_probability_max[i] ?? 0}%<br>`;
  }
  document.getElementById("forecast").innerHTML = out;
}

async function loadTides() {
  const today = new Date();
  const end = new Date();
  end.setDate(today.getDate() + 2);
  const fmt = d => d.toISOString().slice(0,10).replaceAll("-","");

  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=predictions&application=dashboard&begin_date=${fmt(today)}&end_date=${fmt(end)}&datum=MLLW&station=${STATION}&time_zone=lst_ldt&units=english&interval=hilo&format=json`;

  const r = await fetch(url);
  const d = await r.json();

  let out = "";
  d.predictions.slice(0, 6).forEach(t => {
    const time = new Date(t.t.replace(" ", "T")).toLocaleString([], {
      weekday:"short", hour:"numeric", minute:"2-digit"
    });
    const type = t.type === "H" ? "High" : "Low";
    out += `${time}: <b>${type}</b> — ${parseFloat(t.v).toFixed(1)} ft<br>`;
  });
  document.getElementById("tides").innerHTML = out;
}

loadWeather();
loadTides();
setInterval(loadWeather, 30 * 60 * 1000);
setInterval(loadTides, 60 * 60 * 1000);
</script>
</body>
</html>
